<html>
<head>
<title>loop</title>
</head>
<body>
<script type ="text/javascript">
    //conditional (if else,switch)
    let grade='A';
    switch(grade){
        case'A':document.write("<b>Good job<br/>")
        break;
        case'B':document.write("<b>Pretty good<br/>")
        break;
        case'C':document.write("Passed<br/>")
        break;
        case'D':document.write("Fail<br/>")
        break;
    }
</script>
</body>
</html>
